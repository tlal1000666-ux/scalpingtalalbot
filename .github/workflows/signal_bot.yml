name: Trading Signal Bot
on:
  schedule:
    - cron: '1,31 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_bot.py
      - name: Commit state and trade log back to repo
        run: |
          git config --global user.name "signal-bot"
          git config --global user.email "signal-bot@users.noreply.github.com"
          git add state.json trades_log.csv
          git diff --staged --quiet || git commit -m "update bot state"
          git push
