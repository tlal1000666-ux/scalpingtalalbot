name: Trading Signal Bot

on:
  workflow_dispatch: {}   # التشغيل الآن فقط عبر استدعاء خارجي (cron-job.org) أو يدويًا من تبويب Actions

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    concurrency:
      group: trading-signal-bot
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python run_bot.py

      - name: Commit state & trade log back to repo
        run: |
          git config --global user.name "signal-bot"
          git config --global user.email "signal-bot@users.noreply.github.com"

          # إضافة ملفات الحالة والسجلات
          git add state.json trades_log.csv shadow_trades_log.csv

          # إذا كان هناك تغييرات، اعمل commit
          if ! git diff --staged --quiet; then
            git commit -m "تحديث حالة البوت [skip ci]"
          else
            echo "لا يوجد تغيير يستحق الحفظ."
            exit 0
          fi

          # جلب آخر تحديثات من GitHub
          git fetch origin main

          # إعادة تطبيق الـ commit المحلي فوق آخر نسخة من main
          git rebase origin/main

          # رفع التغييرات إلى GitHub
          git push origin HEAD:main
