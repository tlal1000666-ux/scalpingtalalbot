name: Trading Signal Bot

on:
  workflow_dispatch: {}   # التشغيل الآن فقط عبر استدعاء خارجي (cron-job.org) أو يدويًا من تبويب Actions

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    concurrency:
      group: trading-signal-bot
      cancel-in-progress: false
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_bot.py

      - name: Commit state & trade log back to repo
        run: |
          git config --global user.name "signal-bot"
          git config --global user.email "signal-bot@users.noreply.github.com"
          git add state.json trades_log.csv
          if ! git diff --staged --quiet; then
            git commit -m "تحديث حالة البوت [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "لا يوجد تغيير يستحق الحفظ."
          fi
